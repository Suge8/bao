<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 840 440" width="100%" height="100%">

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      .font-sans { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      .font-mono { font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace; }
      .text-primary { fill: #ffffff; }
      .text-secondary { fill: #a1a1aa; }
      .text-muted { fill: #71717a; }
      .text-accent { fill: #f59e0b; }
      .fw-medium { font-weight: 500; }
      .fw-semibold { font-weight: 600; }
      .fw-bold { font-weight: 700; }
      .tracking-tight { letter-spacing: -0.02em; }
      .tracking-wide { letter-spacing: 0.1em; }
      
      @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
      @keyframes float-delayed { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
      @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
      @keyframes line-flow { 0% { stroke-dashoffset: 24; } 100% { stroke-dashoffset: 0; } }
      
      .animate-float { animation: float 6s ease-in-out infinite; }
      .animate-float-delayed { animation: float-delayed 7s ease-in-out infinite; animation-delay: 1.5s; }
      .animate-pulse { animation: pulse 4s ease-in-out infinite; }
      .animate-flow { animation: line-flow 1.5s linear infinite; stroke-dasharray: 6 6; }
    </style>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>
    <radialGradient id="glow-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(245, 158, 11, 0.15)" />
      <stop offset="100%" stop-color="rgba(245, 158, 11, 0.15)" stop-opacity="0" />
    </radialGradient>
    <filter id="shadow-md" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(0, 0, 0, 0.6)" />
    </filter>
    <filter id="shadow-sm" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(0, 0, 0, 0.6)" />
    </filter>
  </defs>
  <rect width="100%" height="440" fill="#0a0a0c" rx="16" />
  <rect width="100%" height="440" fill="url(#bg-grad)" rx="16" opacity="0.6" />
  <rect width="100%" height="440" fill="transparent" stroke="#27272a" stroke-width="2" rx="16" />

  
  <!-- Subtle Glows -->
  <circle cx="200" cy="180" r="220" fill="url(#glow-grad)" class="animate-pulse" />
  <circle cx="660" cy="260" r="220" fill="url(#glow-grad)" class="animate-pulse" style="animation-delay: 2s;" />

  <!-- === LEFT COLUMN: Branding === -->
  <g transform="translate(48, 56)">
    <!-- Logo + Eyebrow row -->
    <image href="data:image/png;base64," x="0" y="0" width="56" height="56" />
    <text x="66" y="30" class="font-sans fw-bold tracking-wide text-accent" font-size="12">PERSONAL AI THAT HOLDS UP</text>
    <text x="66" y="48" class="font-sans fw-medium text-muted" font-size="11">Your Personal AI Framework</text>

    <!-- Title -->
    <text y="120" class="font-sans fw-bold tracking-tight text-primary" font-size="78">Bao</text>

    <!-- Subtitle -->
    <text y="160" class="font-sans fw-bold tracking-tight text-secondary" font-size="20">记得住，能并行，会进化</text>
    <text y="192" class="font-sans fw-medium text-muted" font-size="14">真正的持久记忆 · 闭环经验学习</text>
    <text y="214" class="font-sans fw-medium text-muted" font-size="14">并行长任务引擎 · 无缝接入编程代理体系</text>

    <!-- Accent bar -->
    <rect y="240" width="60" height="4" rx="2" fill="#f59e0b" />
    <rect y="240" x="68" width="30" height="4" rx="2" fill="#f59e0b" opacity="0.4" />
  </g>

  <!-- Connection wire from left to right panel -->
  <path d="M 420 220 C 440 220, 468 220, 488 220" fill="none" class="animate-flow" stroke="rgba(245, 158, 11, 0.4)" stroke-width="2" />
  <circle cx="420" cy="220" r="4" fill="#f59e0b" />

  <!-- === RIGHT COLUMN: Core Panel === -->
  <g transform="translate(488, 39)" filter="url(#shadow-md)">
    <rect width="312" height="362" rx="20" fill="#141417" stroke="#27272a" stroke-width="1.5" />
    
      <g transform="translate(16, 16)">
        <rect width="280" height="50" rx="12" fill="#1c1c21" stroke="#3f3f46" />
        <rect x="10" y="11" width="28" height="28" rx="8" fill="#451a03" />
        <g transform="translate(14, 15)"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5M3 5c0 1.66 4 3 9 3s9-1.34 9-3M3 5c0-1.66 4-3 9-3s9 1.34 9 3M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/></svg></g>
        <text x="48" y="22" class="font-sans fw-bold text-primary" font-size="13">持久记忆</text>
        <text x="48" y="38" class="font-sans fw-medium text-muted" font-size="11">LanceDB 向量检索</text>
      </g>
      <g transform="translate(16, 72)">
        <rect width="280" height="50" rx="12" fill="#1c1c21" stroke="#3f3f46" />
        <rect x="10" y="11" width="28" height="28" rx="8" fill="#022c22" />
        <g transform="translate(14, 15)"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/><path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/><path d="M17.599 6.5a3 3 0 0 0 .399-1.375"/><path d="M6.003 5.125A3 3 0 0 0 6.401 6.5"/><path d="M3.477 10.896a4 4 0 0 1 .585-.396"/><path d="M19.938 10.5a4 4 0 0 1 .585.396"/><path d="M6 18a4 4 0 0 1-1.967-.516"/><path d="M19.967 17.484A4 4 0 0 1 18 18"/></svg></g>
        <text x="48" y="22" class="font-sans fw-bold text-primary" font-size="13">经验引擎</text>
        <text x="48" y="38" class="font-sans fw-medium text-muted" font-size="11">策略复用与置信度</text>
      </g>
      <g transform="translate(16, 128)">
        <rect width="280" height="50" rx="12" fill="#1c1c21" stroke="#3f3f46" />
        <rect x="10" y="11" width="28" height="28" rx="8" fill="#082f49" />
        <g transform="translate(14, 15)"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="14" r="8"/><path d="M12 10v4l2 2"/><path d="M10 2h4"/><path d="M12 2v2"/></svg></g>
        <text x="48" y="22" class="font-sans fw-bold text-primary" font-size="13">长任务系统</text>
        <text x="48" y="38" class="font-sans fw-medium text-muted" font-size="11">压实轨迹, 自动收口</text>
      </g>
      <g transform="translate(16, 184)">
        <rect width="280" height="50" rx="12" fill="#1c1c21" stroke="#3f3f46" />
        <rect x="10" y="11" width="28" height="28" rx="8" fill="#2e1065" />
        <g transform="translate(14, 15)"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" x2="6" y1="3" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg></g>
        <text x="48" y="22" class="font-sans fw-bold text-primary" font-size="13">子代理编排</text>
        <text x="48" y="38" class="font-sans fw-medium text-muted" font-size="11">后台并行静默跑活</text>
      </g>
      <g transform="translate(16, 240)">
        <rect width="280" height="50" rx="12" fill="#1c1c21" stroke="#3f3f46" />
        <rect x="10" y="11" width="28" height="28" rx="8" fill="#4c0519" />
        <g transform="translate(14, 15)"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fb7185" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" x2="20" y1="19" y2="19"/></svg></g>
        <text x="48" y="22" class="font-sans fw-bold text-primary" font-size="13">编码代理</text>
        <text x="48" y="38" class="font-sans fw-medium text-muted" font-size="11">Codex / Claude Code</text>
      </g>
      <g transform="translate(16, 296)">
        <rect width="280" height="50" rx="12" fill="#1c1c21" stroke="#3f3f46" />
        <rect x="10" y="11" width="28" height="28" rx="8" fill="#451a03" />
        <g transform="translate(14, 15)"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></g>
        <text x="48" y="22" class="font-sans fw-bold text-primary" font-size="13">九大平台</text>
        <text x="48" y="38" class="font-sans fw-medium text-muted" font-size="11">一套能力随处可用</text>
      </g>
  </g>

</svg>