# ──────────────────────────────────────────────────────────────
# Bao Desktop — Cross-platform Release Build
# Triggers on version tags: v0.1.0, v1.0.0, etc.
# Produces: macOS arm64/x64 .dmg + Windows x64 .exe installer
# ──────────────────────────────────────────────────────────────
name: Desktop Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  PYTHON_VERSION: '3.11'

jobs:
  build-mac:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Restore compiler caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ccache
            .nuitka-cache
          key: ${{ runner.os }}-${{ matrix.arch }}-desktop-${{ hashFiles('uv.lock', 'app/scripts/build_mac.sh') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-desktop-

      - name: Install ccache
        run: brew install ccache

      - name: Install dependencies
        run: |
          uv sync --extra desktop
          uv pip install nuitka ordered-set zstandard

      - name: Patch Nuitka 4.0.1 bugs
        run: |
          NUITKA_DIR=$(uv run python -c "import nuitka, os; print(os.path.dirname(nuitka.__file__))")
          sed -i.bak 's/key=lambda d: getDistributionName(d))/key=lambda d: getDistributionName(d) or "")/' "$NUITKA_DIR/utils/Distributions.py"
          sed -i.bak 's/return len(getDistributionName(dist))/return len(getDistributionName(dist) or "")/' "$NUITKA_DIR/utils/Distributions.py"
          sed -i.bak 's/assert _package_part == package_part, (_package_part, package_part)/if _package_part != package_part: package_finding = "not-found"/' "$NUITKA_DIR/importing/Recursion.py"
          find "$NUITKA_DIR" -name '*.pyc' -delete

      - name: Build with Nuitka
        env:
          NUITKA_CACHE_DIR: ${{ github.workspace }}/.nuitka-cache
        run: CC="ccache clang" CXX="ccache clang++" CCACHE_DIR="$HOME/.cache/ccache" CCACHE_BASEDIR="$GITHUB_WORKSPACE" CCACHE_COMPILERCHECK=content bash app/scripts/build_mac.sh --arch ${{ matrix.arch }}

      - name: Show ccache stats
        run: ccache -s

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: bash app/scripts/create_dmg.sh --arch ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bao-macos-${{ matrix.arch }}
          path: dist/*.dmg
          retention-days: 14

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Restore Nuitka cache
        uses: actions/cache@v4
        with:
          path: .nuitka-cache
          key: ${{ runner.os }}-x64-desktop-${{ hashFiles('uv.lock', 'app/scripts/build_win.bat') }}
          restore-keys: |
            ${{ runner.os }}-x64-desktop-

      - name: Install dependencies
        run: |
          uv sync --extra desktop
          uv pip install nuitka ordered-set zstandard

      - name: Patch Nuitka 4.0.1 bugs
        shell: pwsh
        run: |
          $nuitkaDir = uv run python -c "import nuitka, os; print(os.path.dirname(nuitka.__file__))"
          $distFile = Join-Path $nuitkaDir 'utils/Distributions.py'
          (Get-Content $distFile) -replace 'key=lambda d: getDistributionName\(d\)\)', 'key=lambda d: getDistributionName(d) or "")' | Set-Content $distFile
          (Get-Content $distFile) -replace 'return len\(getDistributionName\(dist\)\)', 'return len(getDistributionName(dist) or "")' | Set-Content $distFile
          $recFile = Join-Path $nuitkaDir 'importing/Recursion.py'
          (Get-Content $recFile) -replace 'assert _package_part == package_part, \(_package_part, package_part\)', 'if _package_part != package_part: package_finding = "not-found"' | Set-Content $recFile
          Get-ChildItem -Path $nuitkaDir -Recurse -Filter '*.pyc' | Remove-Item -Force

      - name: Validate Windows build script continuation
        run: python app/scripts/validate_build_win_bat.py

      - name: Build with Nuitka
        env:
          NUITKA_CACHE_DIR: ${{ github.workspace }}\.nuitka-cache
        run: app\scripts\build_win.bat

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Create installer
        run: app\scripts\package_win_installer.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bao-windows-x64
          path: dist/Bao-*-windows-x64-setup.exe
          retention-days: 14

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Bao ${{ steps.version.outputs.version }}"
          draft: true
          generate_release_notes: true
          files: |
            artifacts/bao-macos-arm64/*.dmg
            artifacts/bao-macos-x86_64/*.dmg
            artifacts/bao-windows-x64/*.exe
