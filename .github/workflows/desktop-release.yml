# ──────────────────────────────────────────────────────────────
# Bao Desktop — Cross-platform Release Build
# Triggers on version tags: v0.1.0, v1.0.0, etc.
# Produces: macOS arm64/x64 .dmg + Windows x64 .exe installer
# ──────────────────────────────────────────────────────────────
name: Desktop Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_ref:
        description: Existing release tag to rebuild (for example v0.3.11)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: desktop-release-${{ startsWith(github.event.inputs.release_ref || '', 'refs/tags/') && (github.event.inputs.release_ref || '') || startsWith(github.event.inputs.release_ref || '', 'v') && format('refs/tags/{0}', github.event.inputs.release_ref) || github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  PYTHON_VERSION: '3.11'
  NUITKA_VERSION: '4.0.3'

jobs:
  resolve-release:
    runs-on: ubuntu-latest
    outputs:
      release_ref: ${{ steps.resolve.outputs.release_ref }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      release_version: ${{ steps.resolve.outputs.release_version }}
      source_ref: ${{ steps.resolve.outputs.source_ref }}
    steps:
      - name: Resolve release ref
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RELEASE_REF: ${{ github.event.inputs.release_ref || '' }}
        run: |
          ref="${INPUT_RELEASE_REF:-${GITHUB_REF}}"
          case "$ref" in
            refs/tags/v*) ;;
            v*) ref="refs/tags/$ref" ;;
            *)
              echo "::error::Expected a version tag like v0.3.11 or refs/tags/v0.3.11, got '$ref'"
              exit 1
              ;;
          esac

          tag="${ref#refs/tags/}"
          version="${tag#v}"
          source_ref="$ref"
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            source_ref="$GITHUB_REF"
          fi
          echo "release_ref=$ref" >> "$GITHUB_OUTPUT"
          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_version=$version" >> "$GITHUB_OUTPUT"
          echo "source_ref=$source_ref" >> "$GITHUB_OUTPUT"

  validate-version:
    needs: resolve-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-release.outputs.source_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install validation dependencies
        run: uv sync --extra dev --frozen

      - name: Validate release version wiring
        run: uv run python app/scripts/validate_release_version.py --github-ref "${{ needs.resolve-release.outputs.release_ref }}"

      - name: Validate desktop packaging guard rails
        run: PYTHONPATH=. uv run pytest tests/test_desktop_build_scripts.py -q

  build-mac:
    needs: [resolve-release, validate-version, preflight-windows-installer]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-release.outputs.source_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Restore compiler caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ccache
            .nuitka-cache
          key: ${{ runner.os }}-${{ matrix.arch }}-py${{ env.PYTHON_VERSION }}-nuitka${{ env.NUITKA_VERSION }}-desktop-${{ hashFiles('uv.lock', 'app/scripts/build_mac.sh') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-py${{ env.PYTHON_VERSION }}-nuitka${{ env.NUITKA_VERSION }}-desktop-
            ${{ runner.os }}-${{ matrix.arch }}-desktop-

      - name: Ensure ccache
        run: |
          if command -v ccache >/dev/null 2>&1; then
            echo "Using preinstalled ccache: $(command -v ccache)"
          else
            HOMEBREW_NO_AUTO_UPDATE=1 brew install ccache
          fi

      - name: Configure ccache compiler wrappers
        run: |
          CC_REAL="$(command -v clang)"
          CXX_REAL="$(command -v clang++)"
          WRAPPER_DIR="$RUNNER_TEMP/ccache-bin"
          mkdir -p "$WRAPPER_DIR"
          cat >"$WRAPPER_DIR/clang" <<EOF
          #!/usr/bin/env bash
          exec ccache "$CC_REAL" "\$@"
          EOF
          cat >"$WRAPPER_DIR/clang++" <<EOF
          #!/usr/bin/env bash
          exec ccache "$CXX_REAL" "\$@"
          EOF
          chmod +x "$WRAPPER_DIR/clang" "$WRAPPER_DIR/clang++"
          echo "$WRAPPER_DIR" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync --extra desktop-build --frozen

      - name: Build with Nuitka
        env:
          NUITKA_CACHE_DIR: ${{ github.workspace }}/.nuitka-cache
        run: CC=clang CXX=clang++ CCACHE_DIR="$HOME/.cache/ccache" CCACHE_BASEDIR="$GITHUB_WORKSPACE" CCACHE_COMPILERCHECK=content CCACHE_CPP2=yes bash app/scripts/build_mac.sh --arch ${{ matrix.arch }}

      - name: Show ccache stats
        run: ccache -s

      - name: Ensure create-dmg
        run: |
          if command -v create-dmg >/dev/null 2>&1; then
            echo "Using preinstalled create-dmg: $(command -v create-dmg)"
          else
            HOMEBREW_NO_AUTO_UPDATE=1 brew install create-dmg
          fi

      - name: Create DMG
        run: bash app/scripts/create_dmg.sh --arch ${{ matrix.arch }}

      - name: Create update zip
        run: bash app/scripts/create_update_zip.sh --arch ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bao-macos-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*-update.zip
          retention-days: 14
          compression-level: 0

  preflight-windows-installer:
    needs: [resolve-release, validate-version]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-release.outputs.source_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate Inno Setup toolchain early
        shell: pwsh
        run: |
          $resolved = python app/scripts/resolve_inno_setup.py 2>$null
          if ($LASTEXITCODE -ne 0) {
            choco install innosetup -y
            $resolved = python app/scripts/resolve_inno_setup.py
            if ($LASTEXITCODE -ne 0) {
              throw 'Inno Setup compiler with required language files not found.'
            }
          }

          Write-Host "Validated Inno Setup compiler: $resolved"

  build-windows:
    needs: [resolve-release, validate-version, preflight-windows-installer]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-release.outputs.source_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Ensure Inno Setup
        shell: pwsh
        run: |
          $resolved = python app/scripts/resolve_inno_setup.py 2>$null
          if ($LASTEXITCODE -ne 0) {
            choco install innosetup -y
            $resolved = python app/scripts/resolve_inno_setup.py
            if ($LASTEXITCODE -ne 0) {
              throw 'Inno Setup compiler with required language files not found.'
            }
          }

          Write-Host "Using Inno Setup compiler: $resolved"
          "BAO_ISCC_EXE=$resolved" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Restore Nuitka cache
        uses: actions/cache@v4
        with:
          path: .nuitka-cache
          key: ${{ runner.os }}-x64-py${{ env.PYTHON_VERSION }}-nuitka${{ env.NUITKA_VERSION }}-desktop-${{ hashFiles('uv.lock', 'app/scripts/build_win.bat') }}
          restore-keys: |
            ${{ runner.os }}-x64-py${{ env.PYTHON_VERSION }}-nuitka${{ env.NUITKA_VERSION }}-desktop-
            ${{ runner.os }}-x64-desktop-

      - name: Install dependencies
        run: uv sync --extra desktop-build --frozen

      - name: Validate Windows build script continuation
        run: python app/scripts/validate_build_win_bat.py

      - name: Build with Nuitka
        env:
          NUITKA_CACHE_DIR: ${{ github.workspace }}\.nuitka-cache
        run: app\scripts\build_win.bat

      - name: Create installer
        run: app\scripts\package_win_installer.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bao-windows-x64
          path: dist/Bao-*-windows-x64-setup.exe
          retention-days: 14
          compression-level: 0

  release:
    needs: [resolve-release, build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(needs.resolve-release.outputs.release_ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: bao-*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-release.outputs.release_tag }}
          name: "Bao ${{ needs.resolve-release.outputs.release_version }}"
          draft: true
          generate_release_notes: true
          files: |
            artifacts/bao-macos-arm64/*.dmg
            artifacts/bao-macos-x86_64/*.dmg
            artifacts/bao-macos-arm64/*-update.zip
            artifacts/bao-macos-x86_64/*-update.zip
            artifacts/bao-windows-x64/*.exe
