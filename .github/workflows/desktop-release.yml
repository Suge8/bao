# ──────────────────────────────────────────────────────────────
# Bao Desktop — Cross-platform Release Build
# Triggers on version tags: v0.1.0, v1.0.0, etc.
# Produces: macOS arm64/x64 .dmg + Windows x64 .exe installer
# ──────────────────────────────────────────────────────────────
name: Desktop Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      skip_notarize:
        description: 'Skip macOS notarization'
        type: boolean
        default: true

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'

jobs:
  build-mac:
    strategy:
      matrix:
        include:
          - runner: macos-14
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv sync --extra desktop
          uv pip install nuitka ordered-set zstandard

      - name: Patch Nuitka 4.0.1 bugs
        run: |
          NUITKA_DIR=$(uv run python -c "import nuitka, os; print(os.path.dirname(nuitka.__file__))")
          # Bug A: Distributions.py — getDistributionName() returns None in multiple places
          sed -i.bak 's/key=lambda d: getDistributionName(d))/key=lambda d: getDistributionName(d) or "")/' "$NUITKA_DIR/utils/Distributions.py"
          sed -i.bak 's/return len(getDistributionName(dist))/return len(getDistributionName(dist) or "")/' "$NUITKA_DIR/utils/Distributions.py"
          # Bug B: Recursion.py assertion fails for _pytest module
          sed -i.bak 's/assert _package_part == package_part, (_package_part, package_part)/if _package_part != package_part: package_finding = "not-found"/' "$NUITKA_DIR/importing/Recursion.py"
          # Clear bytecode cache
          find "$NUITKA_DIR" -name '*.pyc' -delete
      - name: Build with Nuitka
        run: bash app/scripts/build_mac.sh --arch ${{ matrix.arch }}

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: bash app/scripts/create_dmg.sh --arch ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bao-macos-${{ matrix.arch }}
          path: dist/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv sync --extra desktop
          uv pip install nuitka ordered-set zstandard

      - name: Patch Nuitka 4.0.1 bugs
        shell: pwsh
        run: |
          $nuitkaDir = uv run python -c "import nuitka, os; print(os.path.dirname(nuitka.__file__))"
          $distFile = Join-Path $nuitkaDir 'utils/Distributions.py'
          # Bug A: Distributions.py — getDistributionName() returns None in multiple places
          (Get-Content $distFile) -replace 'key=lambda d: getDistributionName\(d\)\)', 'key=lambda d: getDistributionName(d) or "")' | Set-Content $distFile
          (Get-Content $distFile) -replace 'return len\(getDistributionName\(dist\)\)', 'return len(getDistributionName(dist) or "")' | Set-Content $distFile
          # Bug B: Recursion.py assertion fails for _pytest module
          $recFile = Join-Path $nuitkaDir 'importing/Recursion.py'
          (Get-Content $recFile) -replace 'assert _package_part == package_part, \(_package_part, package_part\)', 'if _package_part != package_part: package_finding = "not-found"' | Set-Content $recFile
          # Clear bytecode cache
          Get-ChildItem -Path $nuitkaDir -Recurse -Filter '*.pyc' | Remove-Item -Force
      - name: Build with Nuitka
        run: app\scripts\build_win.bat

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Create installer
        run: iscc app\scripts\bao_installer.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bao-windows-x64
          path: dist/Bao-*-windows-x64-setup.exe

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Bao ${{ steps.version.outputs.version }}"
          draft: true
          generate_release_notes: true
          files: |
            artifacts/bao-macos-arm64/*.dmg
            artifacts/bao-macos-x86_64/*.dmg
            artifacts/bao-windows-x64/*.exe
