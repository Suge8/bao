# ──────────────────────────────────────────────────────────────
# Bao Desktop — Cross-platform Release Build
# Triggers on version tags: v0.1.0, v1.0.0, etc.
# Produces: macOS arm64/x64 .dmg + Windows x64 .exe installer
# ──────────────────────────────────────────────────────────────
name: Desktop Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_ref:
        description: Existing release tag to rebuild (for example v0.3.11)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: desktop-release-${{ startsWith(github.event.inputs.release_ref || '', 'refs/tags/') && (github.event.inputs.release_ref || '') || startsWith(github.event.inputs.release_ref || '', 'v') && format('refs/tags/{0}', github.event.inputs.release_ref) || github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  PYTHON_VERSION: '3.11'
  PYTHONUTF8: '1'
  INNOSETUP_VERSION: '6.7.1'

jobs:
  resolve-release:
    runs-on: ubuntu-latest
    outputs:
      release_ref: ${{ steps.resolve.outputs.release_ref }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      release_version: ${{ steps.resolve.outputs.release_version }}
      source_ref: ${{ steps.resolve.outputs.source_ref }}
    steps:
      - name: Resolve release ref
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RELEASE_REF: ${{ github.event.inputs.release_ref || '' }}
        run: |
          ref="${INPUT_RELEASE_REF:-${GITHUB_REF}}"
          case "$ref" in
            refs/tags/v*) ;;
            v*) ref="refs/tags/$ref" ;;
            *)
              echo "::error::Expected a version tag like v0.3.11 or refs/tags/v0.3.11, got '$ref'"
              exit 1
              ;;
          esac

          tag="${ref#refs/tags/}"
          version="${tag#v}"
          source_ref="$ref"
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            source_ref="$GITHUB_REF"
          fi
          echo "release_ref=$ref" >> "$GITHUB_OUTPUT"
          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_version=$version" >> "$GITHUB_OUTPUT"
          echo "source_ref=$source_ref" >> "$GITHUB_OUTPUT"

  validate-version:
    needs: resolve-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-release.outputs.source_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install validation dependencies
        run: uv sync --extra dev --frozen

      - name: Validate release version wiring
        run: uv run python app/scripts/validate_release_version.py --github-ref "${{ needs.resolve-release.outputs.release_ref }}"

      - name: Validate desktop packaging guard rails
        run: PYTHONPATH=. uv run pytest tests/test_desktop_build_scripts.py -q

  build-mac:
    needs: [resolve-release, validate-version, preflight-windows-installer]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    env:
      BAO_MAC_CODESIGN_IDENTITY: ${{ secrets.BAO_MAC_CODESIGN_IDENTITY }}
      BAO_MAC_CERT_P12_BASE64: ${{ secrets.BAO_MAC_CERT_P12_BASE64 }}
      BAO_MAC_CERT_P12_PASSWORD: ${{ secrets.BAO_MAC_CERT_P12_PASSWORD }}
      BAO_MAC_NOTARY_APPLE_ID: ${{ secrets.BAO_MAC_NOTARY_APPLE_ID }}
      BAO_MAC_NOTARY_TEAM_ID: ${{ secrets.BAO_MAC_NOTARY_TEAM_ID }}
      BAO_MAC_NOTARY_PASSWORD: ${{ secrets.BAO_MAC_NOTARY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-release.outputs.source_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra desktop-build-pyinstaller --frozen

      - name: Detect macOS signing mode
        id: mac_signing_mode
        shell: bash
        run: |
          set -euo pipefail
          required=(
            BAO_MAC_CODESIGN_IDENTITY
            BAO_MAC_CERT_P12_BASE64
            BAO_MAC_CERT_P12_PASSWORD
            BAO_MAC_NOTARY_APPLE_ID
            BAO_MAC_NOTARY_TEAM_ID
            BAO_MAC_NOTARY_PASSWORD
          )
          missing=0
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing optional macOS signing secret: $name"
              missing=1
            fi
          done

          if [[ "$missing" -eq 0 ]]; then
            echo "BAO_MAC_SIGNING_ENABLED=true" >> "$GITHUB_ENV"
            echo "mode=signed" >> "$GITHUB_OUTPUT"
            echo "Using Developer ID signing + notarization for macOS artifacts."
          else
            echo "BAO_MAC_SIGNING_ENABLED=false" >> "$GITHUB_ENV"
            echo "mode=unsigned" >> "$GITHUB_OUTPUT"
            echo "::warning::macOS signing secrets are incomplete; release artifacts will be built without Developer ID signing or notarization."
          fi

      - name: Import Developer ID certificate
        if: env.BAO_MAC_SIGNING_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/bao-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/bao-cert.p12"
          KEYCHAIN_PASSWORD="$(python3 -c 'import secrets; print(secrets.token_urlsafe(24))')"

          python3 -c 'import base64, os, pathlib; pathlib.Path(os.environ["RUNNER_TEMP"]).joinpath("bao-cert.p12").write_bytes(base64.b64decode(os.environ["BAO_MAC_CERT_P12_BASE64"]))'

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$BAO_MAC_CERT_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcrun
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          {
            echo "BAO_MAC_KEYCHAIN_PATH=$KEYCHAIN_PATH"
            echo "BAO_MAC_CERT_PATH=$CERT_PATH"
          } >> "$GITHUB_ENV"

      - name: Build with PyInstaller
        run: bash app/scripts/build_mac_pyinstaller.sh --arch ${{ matrix.arch }}

      - name: Verify signed app
        if: env.BAO_MAC_SIGNING_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$GITHUB_WORKSPACE/dist-pyinstaller/dist/Bao.app"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          spctl -a -t exec -vv "$APP_PATH"

      - name: Notarize app bundle
        if: env.BAO_MAC_SIGNING_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$GITHUB_WORKSPACE/dist-pyinstaller/dist/Bao.app"
          APP_ZIP="$RUNNER_TEMP/Bao-${{ matrix.arch }}-notary.zip"
          ditto -c -k --keepParent "$APP_PATH" "$APP_ZIP"
          xcrun notarytool submit "$APP_ZIP" \
            --apple-id "$BAO_MAC_NOTARY_APPLE_ID" \
            --team-id "$BAO_MAC_NOTARY_TEAM_ID" \
            --password "$BAO_MAC_NOTARY_PASSWORD" \
            --wait

      - name: Staple app bundle
        if: env.BAO_MAC_SIGNING_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$GITHUB_WORKSPACE/dist-pyinstaller/dist/Bao.app"
          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"

      - name: Ensure create-dmg
        run: |
          if command -v create-dmg >/dev/null 2>&1; then
            echo "Using preinstalled create-dmg: $(command -v create-dmg)"
          else
            HOMEBREW_NO_AUTO_UPDATE=1 brew install create-dmg
          fi

      - name: Create DMG
        run: bash app/scripts/create_dmg.sh --arch ${{ matrix.arch }} --app-path "$GITHUB_WORKSPACE/dist-pyinstaller/dist/Bao.app"

      - name: Notarize DMG
        if: env.BAO_MAC_SIGNING_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          DMG_PATH="$GITHUB_WORKSPACE/dist/Bao-${{ needs.resolve-release.outputs.release_version }}-macos-${{ matrix.arch }}.dmg"
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$BAO_MAC_NOTARY_APPLE_ID" \
            --team-id "$BAO_MAC_NOTARY_TEAM_ID" \
            --password "$BAO_MAC_NOTARY_PASSWORD" \
            --wait

      - name: Staple DMG
        if: env.BAO_MAC_SIGNING_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          DMG_PATH="$GITHUB_WORKSPACE/dist/Bao-${{ needs.resolve-release.outputs.release_version }}-macos-${{ matrix.arch }}.dmg"
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

      - name: Create update zip
        run: bash app/scripts/create_update_zip.sh --arch ${{ matrix.arch }} --app-path "$GITHUB_WORKSPACE/dist-pyinstaller/dist/Bao.app"

      - name: Cleanup macOS signing keychain
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${BAO_MAC_KEYCHAIN_PATH:-}" && -f "$BAO_MAC_KEYCHAIN_PATH" ]]; then
            security delete-keychain "$BAO_MAC_KEYCHAIN_PATH"
          fi
          rm -f "${BAO_MAC_CERT_PATH:-}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bao-macos-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*-update.zip
          retention-days: 14
          compression-level: 0

  preflight-windows-installer:
    needs: [resolve-release, validate-version]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-release.outputs.source_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate Inno Setup toolchain early
        shell: pwsh
        run: |
          $resolved = python app/scripts/resolve_inno_setup.py 2>$null
          if ($LASTEXITCODE -ne 0) {
            choco install innosetup --version=${{ env.INNOSETUP_VERSION }} -y
            $resolved = python app/scripts/resolve_inno_setup.py
            if ($LASTEXITCODE -ne 0) {
              throw 'Inno Setup compiler with required language files not found.'
            }
          }

          Write-Host "Validated Inno Setup compiler: $resolved"

  build-windows:
    needs: [resolve-release, validate-version, preflight-windows-installer]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-release.outputs.source_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Ensure Inno Setup
        shell: pwsh
        run: |
          $resolved = python app/scripts/resolve_inno_setup.py 2>$null
          if ($LASTEXITCODE -ne 0) {
            choco install innosetup --version=${{ env.INNOSETUP_VERSION }} -y
            $resolved = python app/scripts/resolve_inno_setup.py
            if ($LASTEXITCODE -ne 0) {
              throw 'Inno Setup compiler with required language files not found.'
            }
          }

          Write-Host "Using Inno Setup compiler: $resolved"
          "BAO_ISCC_EXE=$resolved" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra desktop-build-pyinstaller --frozen

      - name: Build with PyInstaller
        run: app\scripts\build_win_pyinstaller.bat

      - name: Create installer
        env:
          BAO_DESKTOP_REQUIRE_PRIMARY: '1'
        run: app\scripts\package_win_installer.bat --require-primary --build-root dist-pyinstaller\dist\Bao

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bao-windows-x64
          path: dist/Bao-*-windows-x64-setup.exe
          retention-days: 14
          compression-level: 0

  release:
    needs: [resolve-release, build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(needs.resolve-release.outputs.release_ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: bao-*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-release.outputs.release_tag }}
          name: "Bao ${{ needs.resolve-release.outputs.release_version }}"
          draft: false
          generate_release_notes: true
          files: |
            artifacts/bao-macos-arm64/*.dmg
            artifacts/bao-macos-x86_64/*.dmg
            artifacts/bao-macos-arm64/*-update.zip
            artifacts/bao-macos-x86_64/*-update.zip
            artifacts/bao-windows-x64/*.exe
